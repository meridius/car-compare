<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porovnání aut</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@33.1.1/styles/ag-grid.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@33.1.1/styles/ag-theme-alpine.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Porovnání aut</h1>
        <div class="controls">
            <span id="row-count"></span>
            <button id="btn-clear" onclick="clearFilters()">Vymazat filtry</button>
            <button id="btn-settings" onclick="toggleSettings()">Nastavení barev</button>
        </div>
    </header>
    <div id="settings-panel" class="settings-panel hidden">
        <h3>Prahové hodnoty barev</h3>
        <p>Prázdné = automatický rozsah (min/max sloupce)</p>
        <div id="threshold-inputs"></div>
        <button onclick="saveThresholds()">Uložit</button>
        <button onclick="resetThresholds()">Výchozí</button>
    </div>
    <div id="grid" class="ag-theme-alpine"></div>
    <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@33.1.1/dist/ag-grid-community.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
