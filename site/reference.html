<!DOCTYPE html>
<html lang="cs" data-theme="dark">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Referenční modely</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@33.1.1/styles/ag-grid.min.css">

<body>

        </div>
    </header>
    <div id="grid" class="ag-theme-alpine"></div>
    <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@33.1.1/dist/ag-grid-community.min.js"></script>
    <script src="reference.js"></script>
